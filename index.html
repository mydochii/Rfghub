<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Feed</title>

<style>
body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    color:white;
}
.grid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    padding:10px;
    padding-bottom:70px;
}
.video-card{
    display:flex;
    gap:10px;
    background:#1a1a1a;
    padding:8px;
    border-radius:12px;
    cursor:pointer;
}
.thumb{
    position:relative;
    width:140px;
    flex-shrink:0;
}
.thumb video{
    width:100%;
    height:90px;
    object-fit:cover;
    border-radius:10px;
}
.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:26px;
    background:rgba(0,0,0,0.6);
    border-radius:50%;
    padding:6px 10px;
}
.title{
    font-size:13px;
    color:#ddd;
    line-height:1.3;
}
.navbar{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #222;
}
.navbar div{
    font-size:12px;
    opacity:0.7;
}
.navbar .active{
    opacity:1;
    font-weight:bold;
}
#player{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
    flex-direction:column;
}
#player video{
    width:95%;
    max-width:500px;
}
#closeBtn{
    position:absolute;
    top:15px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="app" class="grid"></div>

<div class="navbar">
    <div class="active">Home</div>
    <div>Trending</div>
    <div>Profile</div>
</div>

<div id="player">
    <span id="closeBtn">✕</span>
    <video id="mainVideo" controls playsinline></video>
</div>

<script>
const ad = "https://otieu.com/4/10005133";

const videoList = [
  ["https://cdn2.videy.co/V1qGFXXg1.mp4","N93W3 B1D4N C4NT1K"],
  ["https://cdn2.videy.co/V8tqEsVX1.mp4","N93W3 1STR1 0R4N9 P1NT3R W0T"],
  ["https://cdn2.videy.co/VYOSfCwz1.mp4","N93W3 P4C4R M3K1 MVLVS"],
  ["https://cdn2.videy.co/WPmTR9kq1.mp4","N93W3 4B9 B0DY MVLVS"],
  ["https://cdn2.videy.co/WcoDs3H31.mp4","N93W3 4B9 M3K1 S3MP1T"],
  ["https://cdn2.videy.co/XA1DFhao1.mp4","L1S4 S1MP3N4N R1DW4N K4M1L"],
  ["https://cdn2.videy.co/XA3rhe0X1.mp4","K4K4K 0M3W T3RVS"],
  ["https://cdn2.videy.co/XKq0c3ox1.mp4","N93W3 1STR1 0R4N9"],
  ["https://cdn2.videy.co/XaoTtNbe1.mp4","N93W3 H1J4B M3K1 1MVT"],
  ["https://cdn2.videy.co/YRjjOaQw1.mp4","N93W3 CH1ND0 S4MB1L M41N HP"],
  ["https://cdn2.videy.co/YXS1XP3E1.mp4","N93W3 CH1ND0 C4NT1K M3K1 P1NK"],
  ["https://cdn2.videy.co/Yvibl1gZ1.mp4","L491 M4K4N D1 SVRVH S3P0N9"],
  ["https://cdn2.videy.co/Z8Xz5HXq1.mp4","CH1ND0 C4NT1K BVG1L D1 K4M4R"],
  ["https://cdn2.videy.co/ZKskw0wz1.mp4","N93W3 P4C4R M0D3 BRVT4L"],
  ["https://cdn2.videy.co/Zsp5sjwI1.mp4","N93W3 CH1ND0 T0G3"],
  ["https://cdn2.videy.co/ZuIszC4H1.mp4","N93W3 C3W3 J4M3T D1 GVBVK"]
];

const app = document.getElementById("app");
const player = document.getElementById("player");
const mainVideo = document.getElementById("mainVideo");
const closeBtn = document.getElementById("closeBtn");

videoList.forEach(v => {

    const card = document.createElement("div");
    card.className = "video-card";

    const thumb = document.createElement("div");
    thumb.className = "thumb";

    const vid = document.createElement("video");
    vid.src = v[0];
    vid.muted = true;
    vid.preload = "metadata";
    vid.playsInline = true;

    const play = document.createElement("div");
    play.className = "play-overlay";
    play.innerHTML = "▶";

    thumb.appendChild(vid);
    thumb.appendChild(play);

    const title = document.createElement("div");
    title.className = "title";
    title.innerHTML = v[1];

    card.appendChild(thumb);
    card.appendChild(title);
    app.appendChild(card);

    card.onclick = () => {
        player.style.display = "flex";
        mainVideo.src = v[0];
        mainVideo.currentTime = 0;
        mainVideo.play();

        // IKLAN AWAL (KLIK)
        window.open(ad,"_blank");

        let ad20 = false;
        let ad40 = false;

        mainVideo.ontimeupdate = () => {
            const t = Math.floor(mainVideo.currentTime);

            if(t >= 20 && !ad20){
                ad20 = true;
                window.open(ad,"_blank");
            }

            if(t >= 40 && !ad40){
                ad40 = true;
                window.open(ad,"_blank");
            }
        };
    };
});

closeBtn.onclick = () => {
    mainVideo.pause();
    mainVideo.src = "";
    player.style.display = "none";
};
</script>

</body>
</html>
